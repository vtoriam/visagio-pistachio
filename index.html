<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediFind — Hospitals & Clinics Near You</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f0f2f5;
        --panel: #ffffff;
        --accent: #e63946;
        --accent2: #2a9d8f;
        --text: #1a1a2e;
        --muted: #6b7280;
        --border: #e5e7eb;
        --hospital: #e63946;
        --clinic: #2a9d8f;
        --pharmacy: #f4a261;
        --urgent: #7209b7;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header ── */
      header {
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        height: 64px;
        display: flex;
        align-items: center;
        gap: 20px;
        z-index: 100;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }

      .logo {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: var(--text);
        white-space: nowrap;
        letter-spacing: -0.5px;
      }

      .logo span {
        color: var(--accent);
      }

      .search-bar {
        flex: 1;
        max-width: 380px;
        display: flex;
        align-items: center;
        background: var(--bg);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 0 14px;
        gap: 8px;
        height: 40px;
        transition: border-color 0.2s;
      }

      .search-bar:focus-within {
        border-color: var(--accent);
      }

      .search-bar input {
        border: none;
        background: transparent;
        outline: none;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        color: var(--text);
        width: 100%;
      }

      .search-bar input::placeholder {
        color: var(--muted);
      }

      .search-icon {
        color: var(--muted);
        font-size: 16px;
        flex-shrink: 0;
      }

      .radius-control {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
        white-space: nowrap;
      }

      .radius-control input[type="range"] {
        width: 90px;
        accent-color: var(--accent);
      }

      .radius-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        min-width: 42px;
      }

      .locate-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 0 16px;
        height: 40px;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.2s,
          transform 0.1s;
      }

      .locate-btn:hover {
        background: #c1121f;
      }
      .locate-btn:active {
        transform: scale(0.97);
      }

      /* ── Filter chips ── */
      .filters {
        padding: 10px 24px;
        display: flex;
        gap: 8px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .chip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 30px;
        font-size: 13px;
        font-weight: 500;
        border: 2px solid var(--border);
        background: #fff;
        cursor: pointer;
        transition: all 0.18s;
        user-select: none;
      }

      .chip .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .chip.active {
        border-color: currentColor;
      }
      .chip[data-type="hospital"] {
        color: var(--hospital);
      }
      .chip[data-type="hospital"].active {
        background: #fff0f0;
      }
      .chip[data-type="doctor"] {
        color: var(--clinic);
      }
      .chip[data-type="doctor"].active {
        background: #f0faf8;
      }
      .chip[data-type="pharmacy"] {
        color: var(--pharmacy);
      }
      .chip[data-type="pharmacy"].active {
        background: #fff8f0;
      }
      .chip[data-type="urgent_care"] {
        color: var(--urgent);
      }
      .chip[data-type="urgent_care"].active {
        background: #f8f0ff;
      }

      /* ── Main layout ── */
      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: 360px;
        flex-shrink: 0;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-header {
        padding: 16px 20px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .sidebar-title {
        font-family: "Syne", sans-serif;
        font-size: 15px;
        font-weight: 700;
      }

      .result-count {
        font-size: 12px;
        color: var(--muted);
        background: var(--bg);
        border-radius: 20px;
        padding: 3px 10px;
        font-weight: 500;
      }

      .sort-bar {
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
      }

      .sort-bar select {
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 3px 8px;
        color: var(--text);
        background: var(--bg);
        outline: none;
        cursor: pointer;
      }

      .results-list {
        overflow-y: auto;
        flex: 1;
      }

      .result-item {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.15s;
        position: relative;
      }

      .result-item:hover {
        background: var(--bg);
      }
      .result-item.active {
        background: #fff5f5;
        border-left: 3px solid var(--accent);
      }

      .result-top {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .type-badge {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }

      .result-name {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        color: var(--text);
      }

      .result-addr {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
        line-height: 1.4;
      }

      .result-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 8px;
        flex-wrap: wrap;
      }

      .stars {
        font-size: 12px;
        color: #f59e0b;
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .open-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 20px;
      }

      .open-badge.open {
        background: #dcfce7;
        color: #16a34a;
      }
      .open-badge.closed {
        background: #fee2e2;
        color: #dc2626;
      }
      .open-badge.unknown {
        background: #f3f4f6;
        color: #6b7280;
      }

      .distance-badge {
        font-size: 11px;
        color: var(--muted);
        background: var(--bg);
        padding: 2px 8px;
        border-radius: 20px;
        font-weight: 500;
      }

      .no-results {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 200px;
        color: var(--muted);
        gap: 8px;
        font-size: 14px;
      }

      /* ── Map ── */
      #map {
        flex: 1;
        position: relative;
      }

      /* ── Info window custom ── */
      .info-box {
        font-family: "DM Sans", sans-serif;
        max-width: 260px;
        padding: 4px;
      }

      .info-box h3 {
        font-family: "Syne", sans-serif;
        font-size: 15px;
        margin-bottom: 4px;
      }

      .info-box p {
        font-size: 12px;
        color: #555;
        margin: 2px 0;
      }

      .info-box .ib-open {
        font-size: 12px;
        font-weight: 600;
        margin-top: 4px;
      }
      .info-box .ib-open.open {
        color: #16a34a;
      }
      .info-box .ib-open.closed {
        color: #dc2626;
      }

      /* ── Loading overlay ── */
      #loading {
        position: fixed;
        inset: 0;
        background: rgba(240, 242, 245, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        flex-direction: column;
        gap: 16px;
        font-family: "DM Sans", sans-serif;
      }

      .spinner {
        width: 44px;
        height: 44px;
        border: 4px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #loading p {
        font-size: 14px;
        color: var(--muted);
      }

      /* ── Empty state ── */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        gap: 12px;
        color: var(--muted);
        padding: 32px 20px;
        text-align: center;
      }

      .empty-state .big-icon {
        font-size: 48px;
        opacity: 0.5;
      }
      .empty-state p {
        font-size: 13px;
        line-height: 1.6;
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: var(--text);
        color: #fff;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 500;
        z-index: 9999;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        pointer-events: none;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
      }

      @media (max-width: 700px) {
        .sidebar {
          width: 100%;
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          z-index: 50;
          max-height: 50vh;
          border-right: none;
          border-top: 2px solid var(--border);
        }
        .main {
          position: relative;
        }
        #map {
          height: 50vh;
        }
        .radius-control {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading MediFind…</p>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Header -->
    <header>
      <div class="logo">Medi<span>Find</span></div>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search suburb or postcode…"
        />
      </div>
      <div class="radius-control">
        <span>Radius</span>
        <input
          type="range"
          id="radiusSlider"
          min="1"
          max="20"
          value="5"
          step="1"
        />
        <span class="radius-label" id="radiusLabel">5 km</span>
      </div>
      <button class="locate-btn" id="locateBtn">📍 Use My Location</button>
    </header>

    <!-- Filter chips -->
    <div class="filters">
      <div class="chip active" data-type="hospital">
        <span class="dot" style="background: var(--hospital)"></span> Hospital
      </div>
      <div class="chip active" data-type="doctor">
        <span class="dot" style="background: var(--clinic)"></span> GP / Clinic
      </div>
      <div class="chip active" data-type="pharmacy">
        <span class="dot" style="background: var(--pharmacy)"></span> Pharmacy
      </div>
      <div class="chip active" data-type="urgent_care">
        <span class="dot" style="background: var(--urgent)"></span> Urgent Care
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Nearby Results</span>
          <span class="result-count" id="resultCount">0 found</span>
        </div>
        <div class="sort-bar">
          Sort by:
          <select id="sortSelect">
            <option value="distance">Distance</option>
            <option value="rating">Rating</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>
        <div class="results-list" id="resultsList">
          <div class="empty-state">
            <div class="big-icon">🏥</div>
            <p>
              Click <strong>"Use My Location"</strong> or search a suburb to
              find hospitals, clinics, pharmacies and urgent care near you.
            </p>
          </div>
        </div>
      </div>
      <div id="map"></div>
    </div>

    <script>
      // ── CONFIG ──────────────────────────────────────────────
      // Replace with your Google Maps API key
      const API_KEY = "YOUR_API_KEY_HERE";

      // ── STATE ───────────────────────────────────────────────
      let map, infoWindow, geocoder, placesService;
      let markers = [];
      let allResults = [];
      let activeFilters = new Set([
        "hospital",
        "doctor",
        "pharmacy",
        "urgent_care",
      ]);
      let userLocation = null;
      let radiusKm = 5;
      let activeItemId = null;

      // ── TYPE CONFIG ─────────────────────────────────────────
      const TYPE_CONFIG = {
        hospital: {
          label: "Hospital",
          icon: "🏥",
          color: "#e63946",
          bg: "#fff0f0",
        },
        doctor: {
          label: "GP / Clinic",
          icon: "🩺",
          color: "#2a9d8f",
          bg: "#f0faf8",
        },
        pharmacy: {
          label: "Pharmacy",
          icon: "💊",
          color: "#f4a261",
          bg: "#fff8f0",
        },
        urgent_care: {
          label: "Urgent Care",
          icon: "🚑",
          color: "#7209b7",
          bg: "#f8f0ff",
        },
      };

      // ── MAPS INIT ───────────────────────────────────────────
      window.initMap = function () {
        const defaultCenter = { lat: -31.9505, lng: 115.8605 }; // Perth

        map = new google.maps.Map(document.getElementById("map"), {
          center: defaultCenter,
          zoom: 13,
          disableDefaultUI: false,
          styles: mapStyle,
          mapTypeControl: false,
        });

        geocoder = new google.maps.Geocoder();
        infoWindow = new google.maps.InfoWindow();
        placesService = new google.maps.places.PlacesService(map);

        document.getElementById("loading").style.display = "none";
      };

      // ── SEARCH ──────────────────────────────────────────────
      function searchNear(location) {
        userLocation = location;
        clearMarkers();
        allResults = [];
        renderList([]);
        document.getElementById("loading").style.display = "flex";

        const types = [...activeFilters];
        let pending = types.length;
        if (pending === 0) {
          document.getElementById("loading").style.display = "none";
          return;
        }

        types.forEach((type) => {
          placesService.nearbySearch(
            {
              location,
              radius: radiusKm * 1000,
              type: [type === "urgent_care" ? "hospital" : type], // Google doesn't have urgent_care type, map to hospital
              keyword: type === "urgent_care" ? "urgent care" : undefined,
            },
            (results, status) => {
              if (
                status === google.maps.places.PlacesServiceStatus.OK &&
                results
              ) {
                results.forEach((place) => {
                  if (!allResults.find((r) => r.place_id === place.place_id)) {
                    allResults.push({ ...place, _type: type });
                  }
                });
              }
              pending--;
              if (pending === 0) {
                document.getElementById("loading").style.display = "none";
                sortAndRender();
              }
            },
          );
        });
      }

      // ── SORT ────────────────────────────────────────────────
      function sortAndRender() {
        const sort = document.getElementById("sortSelect").value;
        let sorted = [...allResults];

        if (sort === "distance" && userLocation) {
          sorted.sort((a, b) => {
            const da = distanceKm(userLocation, {
              lat: a.geometry.location.lat(),
              lng: a.geometry.location.lng(),
            });
            const db = distanceKm(userLocation, {
              lat: b.geometry.location.lat(),
              lng: b.geometry.location.lng(),
            });
            return da - db;
          });
        } else if (sort === "rating") {
          sorted.sort((a, b) => (b.rating || 0) - (a.rating || 0));
        } else if (sort === "name") {
          sorted.sort((a, b) => a.name.localeCompare(b.name));
        }

        renderList(sorted);
        renderMarkers(sorted);
      }

      // ── RENDER LIST ─────────────────────────────────────────
      function renderList(places) {
        const list = document.getElementById("resultsList");
        document.getElementById("resultCount").textContent =
          `${places.length} found`;

        if (places.length === 0) {
          list.innerHTML = `<div class="empty-state"><div class="big-icon">🔍</div><p>No results found. Try a larger radius or different filters.</p></div>`;
          return;
        }

        list.innerHTML = places
          .map((place, i) => {
            const cfg = TYPE_CONFIG[place._type] || TYPE_CONFIG.hospital;
            const rating = place.rating
              ? `<span class="stars">⭐ ${place.rating.toFixed(1)}</span>`
              : "";
            const openNow = place.opening_hours
              ? place.opening_hours.open_now
                ? `<span class="open-badge open">Open Now</span>`
                : `<span class="open-badge closed">Closed</span>`
              : `<span class="open-badge unknown">Hours N/A</span>`;

            let dist = "";
            if (userLocation && place.geometry) {
              const km = distanceKm(userLocation, {
                lat: place.geometry.location.lat(),
                lng: place.geometry.location.lng(),
              });
              dist = `<span class="distance-badge">${km.toFixed(1)} km away</span>`;
            }

            return `
        <div class="result-item" data-id="${place.place_id}" onclick="selectPlace('${place.place_id}')">
          <div class="result-top">
            <div class="type-badge" style="background:${cfg.bg}; font-size:18px">${cfg.icon}</div>
            <div>
              <div class="result-name">${escHtml(place.name)}</div>
              <div class="result-addr">${escHtml(place.vicinity || "")}</div>
            </div>
          </div>
          <div class="result-meta">
            ${rating}
            ${openNow}
            ${dist}
          </div>
        </div>
      `;
          })
          .join("");
      }

      // ── MARKERS ─────────────────────────────────────────────
      function renderMarkers(places) {
        clearMarkers();
        places.forEach((place) => {
          const cfg = TYPE_CONFIG[place._type] || TYPE_CONFIG.hospital;
          const marker = new google.maps.Marker({
            map,
            position: place.geometry.location,
            title: place.name,
            icon: {
              path: google.maps.SymbolPath.CIRCLE,
              scale: 12,
              fillColor: cfg.color,
              fillOpacity: 1,
              strokeColor: "#fff",
              strokeWeight: 2,
            },
          });

          marker.addListener("click", () => {
            selectPlace(place.place_id, false);
            showInfoWindow(marker, place, cfg);
          });

          marker._placeId = place.place_id;
          markers.push(marker);
        });
      }

      function clearMarkers() {
        markers.forEach((m) => m.setMap(null));
        markers = [];
      }

      function showInfoWindow(marker, place, cfg) {
        const openText = place.opening_hours
          ? place.opening_hours.open_now
            ? `<span class="ib-open open">Open Now</span>`
            : `<span class="ib-open closed">Closed</span>`
          : "";
        const rating = place.rating ? `⭐ ${place.rating.toFixed(1)}` : "";
        infoWindow.setContent(`
      <div class="info-box">
        <h3>${cfg.icon} ${escHtml(place.name)}</h3>
        <p>${escHtml(place.vicinity || "")}</p>
        <p>${rating}</p>
        ${openText}
      </div>
    `);
        infoWindow.open(map, marker);
      }

      // ── SELECT PLACE ────────────────────────────────────────
      function selectPlace(placeId, scroll = true) {
        // Highlight list item
        document.querySelectorAll(".result-item").forEach((el) => {
          el.classList.toggle("active", el.dataset.id === placeId);
        });

        if (scroll) {
          const el = document.querySelector(
            `.result-item[data-id="${placeId}"]`,
          );
          if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        // Pan to marker
        const marker = markers.find((m) => m._placeId === placeId);
        if (marker) {
          map.panTo(marker.getPosition());
          map.setZoom(15);
          const place = allResults.find((p) => p.place_id === placeId);
          if (place) {
            const cfg = TYPE_CONFIG[place._type] || TYPE_CONFIG.hospital;
            showInfoWindow(marker, place, cfg);
          }
        }
      }

      // ── LOCATE ME ───────────────────────────────────────────
      document.getElementById("locateBtn").addEventListener("click", () => {
        if (!navigator.geolocation) {
          showToast("Geolocation not supported.");
          return;
        }
        showToast("Detecting your location…");
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            map.setCenter(loc);
            new google.maps.Marker({
              map,
              position: loc,
              title: "You are here",
              icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 9,
                fillColor: "#2563eb",
                fillOpacity: 1,
                strokeColor: "#fff",
                strokeWeight: 2,
              },
            });
            searchNear(loc);
          },
          () =>
            showToast("Could not get location. Please enable location access."),
        );
      });

      // ── SEARCH INPUT ────────────────────────────────────────
      let searchTimer;
      document.getElementById("searchInput").addEventListener("input", (e) => {
        clearTimeout(searchTimer);
        const q = e.target.value.trim();
        if (q.length < 3) return;
        searchTimer = setTimeout(() => {
          geocoder.geocode(
            { address: q + ", Western Australia, Australia" },
            (results, status) => {
              if (status === "OK" && results[0]) {
                const loc = results[0].geometry.location;
                map.setCenter(loc);
                map.setZoom(13);
                searchNear({ lat: loc.lat(), lng: loc.lng() });
              } else {
                showToast("Suburb not found. Try another search.");
              }
            },
          );
        }, 600);
      });

      // ── RADIUS SLIDER ────────────────────────────────────────
      document.getElementById("radiusSlider").addEventListener("input", (e) => {
        radiusKm = parseInt(e.target.value);
        document.getElementById("radiusLabel").textContent = `${radiusKm} km`;
        if (userLocation) searchNear(userLocation);
      });

      // ── SORT ─────────────────────────────────────────────────
      document
        .getElementById("sortSelect")
        .addEventListener("change", sortAndRender);

      // ── FILTER CHIPS ─────────────────────────────────────────
      document.querySelectorAll(".chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          const type = chip.dataset.type;
          if (activeFilters.has(type)) {
            if (activeFilters.size === 1) {
              showToast("At least one filter must be active.");
              return;
            }
            activeFilters.delete(type);
            chip.classList.remove("active");
          } else {
            activeFilters.add(type);
            chip.classList.add("active");
          }
          if (userLocation) searchNear(userLocation);
        });
      });

      // ── UTILS ────────────────────────────────────────────────
      function distanceKm(a, b) {
        const R = 6371;
        const dLat = ((b.lat - a.lat) * Math.PI) / 180;
        const dLng = ((b.lng - a.lng) * Math.PI) / 180;
        const x =
          Math.sin(dLat / 2) ** 2 +
          Math.cos((a.lat * Math.PI) / 180) *
            Math.cos((b.lat * Math.PI) / 180) *
            Math.sin(dLng / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
      }

      // ── MAP STYLE ────────────────────────────────────────────
      const mapStyle = [

    </script>
