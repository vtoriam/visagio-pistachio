<!DOCTYPE html>
<html>
<head>
  <title>Map</title>
  <style>
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
let map;   // make global so callback can use it

function initMap() {

  // default location (fallback if GPS fails)
  const defaultLocation = { lat: -31.9505, lng: 115.8605 };

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 13,
    center: defaultLocation
  });

  // marker for default location
  new google.maps.Marker({
    position: defaultLocation,
    map
  });

  const service = new google.maps.places.PlacesService(map);

  // search hospitals near default location
  service.nearbySearch({
    location: defaultLocation,
    radius: 5000,
    keyword: "hospital"
  }, callback);
}

// callback must use GLOBAL map
function callback(results, status) {
  if (status === google.maps.places.PlacesServiceStatus.OK) {

    results.forEach(place => {

      new google.maps.Marker({
        position: place.geometry.location,
        map: map,
        title: place.name
      });

    });
  }
}
</script>

<!-- IMPORTANT: must include libraries=places -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXtz4HiLnE_nfkCWc4B_ZFbegJohUBab4&libraries=places&callback=initMap" async defer></script>

</body>
</html>
