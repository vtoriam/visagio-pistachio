<!doctype html>
<html>
  <head>
    <title>Healthcare Map</title>
    <style>
      #map {
        height: 100vh;
        width: 100%;
      }
      #controls {
        position: absolute;
        top: 10px;
        left: 10px;
        background: white;
        padding: 10px;
        border-radius: 6px;
        font-family: Arial, sans-serif;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div id="controls">
      <label
        ><input
          type="checkbox"
          checked
          onchange="toggleMarkers('hospital', this.checked)"
        />
        Hospitals</label
      ><br />
      <label
        ><input
          type="checkbox"
          checked
          onchange="toggleMarkers('urgent', this.checked)"
        />
        Urgent Care</label
      ><br />
      <label
        ><input
          type="checkbox"
          checked
          onchange="toggleMarkers('pharmacy', this.checked)"
        />
        Pharmacies</label
      >
    </div>

    <script>
      let map;
      let markers = {
        hospital: [],
        urgent: [],
        pharmacy: [],
      };

      function initMap() {
        const defaultLocation = { lat: -31.9505, lng: 115.8605 };

        map = new google.maps.Map(document.getElementById("map"), {
          zoom: 13,
          center: defaultLocation,
        });

        const service = new google.maps.places.PlacesService(map);

        // Hospitals
        service.nearbySearch(
          {
            location: defaultLocation,
            radius: 5000,
            type: "hospital",
          },
          (results, status) => addMarkers(results, status, "red", "hospital"),
        );

        // Urgent Care
        service.nearbySearch(
          {
            location: defaultLocation,
            radius: 5000,
            keyword: "urgent care",
          },
          (results, status) => addMarkers(results, status, "blue", "urgent"),
        );

        // Pharmacies
        service.nearbySearch(
          {
            location: defaultLocation,
            radius: 5000,
            type: "pharmacy",
          },
          (results, status) => addMarkers(results, status, "green", "pharmacy"),
        );
      }

      function addMarkers(results, status, color, category) {
        if (status === google.maps.places.PlacesServiceStatus.OK) {
          results.forEach((place) => {
            const marker = new google.maps.Marker({
              position: place.geometry.location,
              map: map,
              title: place.name,
              icon: {
                url: `http://maps.google.com/mapfiles/ms/icons/${color}-dot.png`,
              },
            });
            markers[category].push(marker);
          });
        }
      }

      function toggleMarkers(category, show) {
        markers[category].forEach((marker) => {
          marker.setMap(show ? map : null);
        });
      }
    </script>

    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXtz4HiLnE_nfkCWc4B_ZFbegJohUBab4&libraries=places&callback=initMap"
      async
      defer
    ></script>
  </body>
</html>
